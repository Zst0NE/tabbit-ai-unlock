<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabbit BYOK</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <div class="title">
      <strong>BYOK AI</strong>
      <span id="meta" class="meta">…</span>
    </div>
    <div class="actions">
      <button type="button" id="btnSettings" title="设置">⚙</button>
      <button type="button" id="btnClear" title="清空对话">🗑</button>
    </div>
  </header>
  <main id="log"></main>
  <footer>
    <textarea id="input" rows="2" placeholder="输入消息，Enter 发送 / Shift+Enter 换行"></textarea>
    <button type="button" id="send">发送</button>
  </footer>
  <script src="sidepanel.js"></script>
</body>
</html>
