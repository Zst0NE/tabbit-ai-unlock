<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabbit BYOK 设置</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --border: #2a2f3a;
      --text: #e8eaed; --muted: #9aa0a6; --accent: #6c8cff; --ok: #3dd68c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text); padding: 32px 16px;
    }
    .card {
      max-width: 560px; margin: 0 auto; background: var(--panel);
      border: 1px solid var(--border); border-radius: 14px; padding: 24px;
    }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { color: var(--muted); font-size: 13px; line-height: 1.5; }
    label { display: block; margin: 14px 0 6px; font-size: 13px; color: var(--muted); }
    input, select {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text); font: inherit;
    }
    .row { display: flex; gap: 10px; margin-top: 20px; }
    button {
      border: 0; border-radius: 10px; padding: 10px 16px; font-weight: 600; cursor: pointer;
    }
    #save { background: var(--accent); color: #fff; }
    #import { background: transparent; color: var(--text); border: 1px solid var(--border); }
    #status { margin-top: 14px; font-size: 13px; color: var(--ok); min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BYOK API 设置</h1>
    <p>配置后，在 Tabbit 任意页面点击工具栏扩展图标，即可打开内嵌侧栏聊天面板。</p>

    <label for="provider">Provider</label>
    <select id="provider">
      <option value="openai">OpenAI</option>
      <option value="anthropic">Anthropic</option>
      <option value="openai-compatible">OpenAI-compatible（代理 / NewAPI 等）</option>
    </select>

    <label for="base_url">Base URL</label>
    <input id="base_url" placeholder="https://api.openai.com/v1" />

    <label for="api_key">API Key</label>
    <input id="api_key" type="password" placeholder="sk-..." autocomplete="off" />

    <label for="model">Model</label>
    <input id="model" placeholder="gpt-4o-mini / claude-sonnet-4-6" />

    <div class="row">
      <button type="button" id="save">保存</button>
      <button type="button" id="import">从 api_config.json 文本导入</button>
    </div>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
